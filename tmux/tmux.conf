set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 50000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
set -g extended-keys on
set -g set-titles on
set -g set-titles-string "#{pane_title}"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on

set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

unbind C-b
set -g prefix '§'
bind '§' send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

bind c new-window -c "#{pane_current_path}"
bind -r n next-window
bind -r p previous-window

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

set -g status-position bottom
set -g status-interval 20
set -g status-left-length 60
set -g status-right-length 160

set -g status-style "bg=#1a1a1a,fg=#e5e5e5"

# left: session name / git branch
set -g  status-left ""
set -ga status-left "#[bg=#e8956d,fg=#1a1a1a,bold]  #S  "
set -ga status-left "#[bg=#1a1a1a,fg=#e8956d]"
set -ga status-left "#[fg=#6b7280]  #(git -C #{pane_current_path} branch --show-current 2>/dev/null)  "

# right: ip / date / time
set -g  status-right ""
set -ga status-right "#[fg=#6b7280]  #(ipconfig getifaddr en0 2>/dev/null || ipconfig getifaddr en1 2>/dev/null || echo '--')"
set -ga status-right "#[fg=#374151]│"
set -ga status-right "#[fg=#a3a3a3]  %d %b  "
set -ga status-right "#[fg=#374151]│"
set -ga status-right "#[fg=#e8956d,bold]  %H:%M  "

# windows
setw -g window-status-format "#[fg=#6b7280]  #I  #W  "
setw -g window-status-current-format "#[bg=#252525,fg=#e5e5e5,bold]  #I  #W  #[bg=#1a1a1a,fg=#1a1a1a]"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#e8956d"

# messages / command prompt
set -g message-style "bg=#e8956d,fg=#1a1a1a,bold"

bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E lazygit
bind e display-popup -d "#{pane_current_path}" -w 90% -h 90% -E ranger

bind N display-popup -w 70% -h 20% -E \
  "zsh -c 'source ~/dotfiles/zsh/functions.sh; printf \"Session name: \"; read input; _tmux_new_session \"\$input\"'"
bind s display-popup -w 90% -h 80% -E \
  "tmux list-sessions -F '#{session_name}' \
  | fzf --no-multi --no-info --height=100% \
    --preview 'tmux capture-pane -ep -t {}' \
    --preview-window=up:~7:border-bottom:follow \
  | xargs -r tmux switch-client -t"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
