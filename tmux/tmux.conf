# ── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 2000000
set -g mouse on
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix §
bind § send-prefix

# ── Reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Splits ───────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigation (vim-like) ─────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize panes ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi keys) ───────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 160

set -g status-style "bg=#1a1a1a,fg=#e5e5e5"

# Left: session name · git branch
set -g  status-left ""
set -ga status-left "#[bg=#e8956d,fg=#1a1a1a,bold]  #S  "
set -ga status-left "#[bg=#1a1a1a,fg=#e8956d]"
set -ga status-left "#[fg=#6b7280]  #(git -C #{pane_current_path} branch --show-current 2>/dev/null)  "

# Right: ip · date · time
set -g  status-right ""
set -ga status-right "#[fg=#6b7280]  #(ipconfig getifaddr en0 2>/dev/null || ipconfig getifaddr en1 2>/dev/null || echo '--')"
set -ga status-right "#[fg=#374151]│"
set -ga status-right "#[fg=#a3a3a3]  %d %b  "
set -ga status-right "#[fg=#374151]│"
set -ga status-right "#[fg=#e8956d,bold]  %H:%M  "

# Windows
setw -g window-status-format "#[fg=#6b7280]  #I  #W  "
setw -g window-status-current-format "#[bg=#252525,fg=#e5e5e5,bold]  #I  #W  #[bg=#1a1a1a,fg=#1a1a1a]"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#e8956d"

# Messages / command prompt
set -g message-style "bg=#e8956d,fg=#1a1a1a,bold"
