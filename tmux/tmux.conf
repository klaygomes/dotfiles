set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 50000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
set -g allow-passthrough on
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:hyperlinks"
set -as terminal-features 'xterm*:extkeys'
set-environment -g CLAUDE_CODE_NO_FLICKER 1
# Update @git_branch immediately on any focus change (avoids #() caching)
set-hook -g pane-focus-in        'run-shell "$HOME/dotfiles/scripts/tmux-update-branch.sh #{pane_current_path}"'
set-hook -g after-select-pane    'run-shell "$HOME/dotfiles/scripts/tmux-update-branch.sh #{pane_current_path}"'
set-hook -g after-select-window  'run-shell "$HOME/dotfiles/scripts/tmux-update-branch.sh #{pane_current_path}"'
set-hook -g client-session-changed 'run-shell "$HOME/dotfiles/scripts/tmux-update-branch.sh #{pane_current_path}"'
set -g extended-keys always
set -g set-titles on
set -g set-titles-string "#{pane_title}"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on

set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

unbind C-b
set -g prefix '§'
set -g prefix2 '`'
bind '§' send-prefix
bind '`' send-prefix -2

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

bind c new-window -c "#{pane_current_path}"
bind -r n next-window
bind -r p previous-window

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T popup       Escape detach-client

set -g display-time 2000
set -g status-position bottom
set -g status-interval 2
set -g status-left-length 60
set -g status-right-length 160

set -g status-style "bg=#1a1a1a,fg=#e5e5e5"

# left: session name
set -g  status-left ""
set -ga status-left "#[bg=#e8956d,fg=#1a1a1a,bold]  #S  "
set -ga status-left "#[bg=#1a1a1a,fg=#e8956d]"

# right: claude loading indicator / git branch / tasks / ip
set -g  status-right ""
set -ga status-right "#[fg=#e8956d,bold]#(~/dotfiles/scripts/tmux-claude-indicator.sh)"
set -ga status-right "#[fg=#6b7280]  #{@git_branch}"
set -ga status-right "#[fg=#374151]│"
set -ga status-right "#[fg=#6b7280]  T:#(task +PENDING count 2>/dev/null || echo 0) #[fg=#e8956d]D:#(task +PENDING due:today count 2>/dev/null || echo 0)"
set -ga status-right "#[fg=#374151]│"
set -ga status-right "#[fg=#6b7280]  #(ipconfig getifaddr en0 2>/dev/null || ipconfig getifaddr en1 2>/dev/null || echo '--')  "

# windows
setw -g window-status-format "#[fg=#6b7280]  #I  #W  "
setw -g window-status-current-format "#[bg=#252525,fg=#e5e5e5,bold]  #I  #W  #[bg=#1a1a1a,fg=#1a1a1a]"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#e8956d"

# messages / command prompt
set -g message-style "bg=#e8956d,fg=#1a1a1a,bold"

bind t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "~/dotfiles/scripts/tmux-task-menu.sh"
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E lazygit
bind e display-popup -d "#{pane_current_path}" -w 90% -h 90% -E ranger
bind i display-popup -d "#{pane_current_path}" -w 95% -h 92% -E claude
bind T display-popup -d "#{pane_current_path}" -w 90% -h 90% -E zsh

bind X run-shell 'tmux switch-client -p \; kill-session -t "#{session_name}"'

bind N display-popup -w 70% -h 20% -E "zsh ~/dotfiles/scripts/tmux-new-session.sh"
bind a new-window -n "" "~/dotfiles/scripts/tmux-fuzzy-session.sh"
bind s display-popup -w 90% -h 80% -E "~/dotfiles/scripts/tmux-switch-session.sh"
bind o run-shell 'cd "#{pane_current_path}" && gh pr view --web 2>/dev/null || tmux display-message "gh pr view: no PR found"'

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
