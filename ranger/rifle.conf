# rifle.conf — open files with neovim by default on macOS
# Rules are matched top-to-bottom; first match wins.

# Directories → recurse into ranger
directory = ranger -- "$@"

# Text / code → neovim (picks up ~/.config/nvim automatically)
mime ^text = nvim -- "$@"
ext py|rb|js|ts|tsx|jsx|go|rs|c|cpp|h|hpp|java|sh|bash|zsh|lua|vim|json|yaml|yml|toml|md|txt|cfg|conf|ini|env|sql|graphql|tf|hcl|Makefile|Dockerfile = nvim -- "$@"

# Images / video / audio → macOS default
mime ^image|^video|^audio = open -- "$@"

# PDF / office docs → macOS default
ext pdf|docx?|xlsx?|pptx? = open -- "$@"

# Archives → macOS default
ext zip|gz|bz2|xz|tar|rar|7z = open -- "$@"

# Fallback: everything else with macOS open, then nvim as last resort
= open -- "$@"
label editor = nvim -- "$@"
