services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - ${CHROMA_DATA_DIR:-${HOME}/personal/chroma_data}:/data
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
