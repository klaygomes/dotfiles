<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Reviewer</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='55' r='42' fill='%23D97757' stroke='%238B3E1F' stroke-width='5'/%3E%3Cpath d='M 50 19 L 50 9 Q 50 4 54 4 Q 64 4 68 13 Q 60 19 50 19 Z' fill='%237FB069' stroke='%234A7038' stroke-width='2' stroke-linejoin='round'/%3E%3Cellipse cx='36' cy='38' rx='10' ry='13' fill='%23F0A688' opacity='0.55'/%3E%3Cellipse cx='36' cy='52' rx='9' ry='11' fill='%23181818'/%3E%3Cellipse cx='64' cy='52' rx='9' ry='11' fill='%23181818'/%3E%3Ccircle cx='39' cy='48' r='3.2' fill='white'/%3E%3Ccircle cx='67' cy='48' r='3.2' fill='white'/%3E%3Cpath d='M 33 70 Q 50 84 67 70' fill='none' stroke='%23181818' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-header">
        <svg class="sidebar-mascot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="55" r="42" fill="#D97757" stroke="#8B3E1F" stroke-width="5"/>
          <path d="M 50 19 L 50 9 Q 50 4 54 4 Q 64 4 68 13 Q 60 19 50 19 Z" fill="#7FB069" stroke="#4A7038" stroke-width="2" stroke-linejoin="round"/>
          <ellipse cx="36" cy="38" rx="10" ry="13" fill="#F0A688" opacity="0.55"/>
          <ellipse cx="36" cy="52" rx="9" ry="11" fill="#181818"/>
          <ellipse cx="64" cy="52" rx="9" ry="11" fill="#181818"/>
          <circle cx="39" cy="48" r="3.2" fill="white"/>
          <circle cx="67" cy="48" r="3.2" fill="white"/>
          <path d="M 33 70 Q 50 84 67 70" fill="none" stroke="#181818" stroke-width="5" stroke-linecap="round"/>
        </svg>
        <span class="sidebar-title">Plan Reviewer</span>
      </div>
      <div class="sidebar-section annotations-section">
        <div class="section-label">
          Annotations
          <span id="annotation-count" class="count-badge">0</span>
        </div>
        <div id="annotation-list"></div>
      </div>

      <div class="sidebar-footer">
        <textarea id="summary-input" placeholder="Summary (optional)…"></textarea>
        <button class="btn btn-approve"  onclick="window.__submitReview('approve')">Approve</button>
        <button class="btn btn-changes"  onclick="window.__submitReview('request_changes')">Request Changes</button>
        <button class="btn btn-comment"  onclick="window.__submitReview('comment')">Comment</button>
      </div>
    </aside>

    <div class="main-area">
      <div class="tabs-bar">
        <button class="tab tab-active" id="tab-editor" onclick="window.__switchTab('editor')">Editor</button>
        <button class="tab" id="tab-preview" onclick="window.__switchTab('preview')">Preview</button>
      </div>
      <main id="editor-container"></main>
      <div id="preview-container" class="hidden"></div>
    </div>

  </div>

  <footer class="statusbar">
    <div class="statusbar-right">
      <span class="statusbar-plan" id="plan-name"></span>
      <span class="statusbar-badge">
        <svg class="statusbar-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="55" r="42" fill="#D97757" stroke="#8B3E1F" stroke-width="5"/>
          <path d="M 50 19 L 50 9 Q 50 4 54 4 Q 64 4 68 13 Q 60 19 50 19 Z" fill="#7FB069" stroke="#4A7038" stroke-width="2" stroke-linejoin="round"/>
          <ellipse cx="36" cy="38" rx="10" ry="13" fill="#F0A688" opacity="0.55"/>
          <ellipse cx="36" cy="52" rx="9" ry="11" fill="#181818"/>
          <ellipse cx="64" cy="52" rx="9" ry="11" fill="#181818"/>
          <circle cx="39" cy="48" r="3.2" fill="white"/>
          <circle cx="67" cy="48" r="3.2" fill="white"/>
          <path d="M 33 70 Q 50 84 67 70" fill="none" stroke="#181818" stroke-width="5" stroke-linecap="round"/>
        </svg>
        Plan Reviewer
      </span>
    </div>
  </footer>

  <div id="inline-popover" class="inline-popover hidden">
    <textarea id="inline-comment-input" class="inline-popover-textarea" placeholder="Add comment… (⌘↵)"></textarea>
    <div class="inline-popover-actions">
      <button class="btn btn-save" onclick="window.__saveInlineComment()">Save <kbd>⌘↵</kbd></button>
      <button class="btn btn-cancel" onclick="window.__hideInlinePopover()">Cancel</button>
    </div>
  </div>

  <div id="comment-dialog" class="dialog-backdrop hidden">
    <div class="dialog-box">
      <p class="dialog-label">Selected text</p>
      <blockquote class="dialog-preview" id="dialog-preview"></blockquote>
      <label class="dialog-label" for="comment-input">Comment</label>
      <textarea id="comment-input" class="dialog-textarea" placeholder="Your comment…"
        onkeydown="if(event.key==='Enter'&&event.metaKey) window.__saveAnnotation()"></textarea>
      <div class="dialog-actions">
        <button class="btn btn-save" onclick="window.__saveAnnotation()">Save <kbd>⌘↵</kbd></button>
        <button class="btn btn-cancel" onclick="window.__cancelAnnotation()">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    window._mermaid = mermaid;
  </script>
  <script src="/editor.bundle.js"></script>
</body>
</html>
